<!DOCTYPE html>
<html lang="tr">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gizlilik Oyunu - Prosedürel Harita Testi</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 20px;
        }
        canvas {
            background-color: #0f0f0f;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
            border: 2px solid #333;
            margin-top: 10px;
        }
        button {
            margin-top: 15px;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
        }
        button:hover {
            background-color: #45a049;
        }
        .bilgi {
            color: #aaa;
            font-size: 14px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <h2>Prosedürel Harita Üretimi ve Çizgi Dönüşümü</h2>
    <canvas id="oyunEkrani" width="750" height="750"></canvas>
    <button onclick="haritayiYenile()">Yeni Harita Üret</button>
    <p class="bilgi">Mavi çizgiler, BSP Ağacı ve Raycasting algoritmalarına gidecek olan duvar segmentleridir.</p>

    <script>
        // Rastgele labirent üretimi burada.
        function rastgeleLabirentUret(genislik, yukseklik) {
            if (genislik % 2 === 0) genislik++;
            if (yukseklik % 2 === 0) yukseklik++;

            let labirent = Array(yukseklik).fill().map(() => Array(genislik).fill(1));

            function kaz(x, y) {
                labirent[y][x] = 0;

                let yonler = [ [0, -2], [0, 2], [2, 0], [-2, 0] ];
                yonler.sort(() => Math.random() - 0.5);

                for (let i = 0; i < yonler.length; i++) {
                    let dx = yonler[i][0];
                    let dy = yonler[i][1];
                    let yeniX = x + dx;
                    let yeniY = y + dy;

                    if (yeniY > 0 && yeniY < yukseklik - 1 && yeniX > 0 && yeniX < genislik - 1 && labirent[yeniY][yeniX] === 1) {
                        labirent[y + dy / 2][x + dx / 2] = 0;
                        kaz(yeniX, yeniY);
                    }
                }
            }
            kaz(1, 1);
            return labirent;
        }

        // Parser kodu burada.
        function labirentiCizgilereDonustur(grid, hucreBoyutu) {
            const cizgiler = [];
            const yukseklik = grid.length;
            const genislik = grid[0].length;

            for (let y = 0; y < yukseklik; y++) {
                for (let x = 0; x < genislik; x++) {
                    if (grid[y][x] === 1) { 
                        const pikselX = x * hucreBoyutu;
                        const pikselY = y * hucreBoyutu;

                        if (y === 0 || grid[y - 1][x] === 0) {
                            cizgiler.push({ x1: pikselX, y1: pikselY, x2: pikselX + hucreBoyutu, y2: pikselY });
                        }
                        if (y === yukseklik - 1 || grid[y + 1][x] === 0) {
                            cizgiler.push({ x1: pikselX, y1: pikselY + hucreBoyutu, x2: pikselX + hucreBoyutu, y2: pikselY + hucreBoyutu });
                        }
                        if (x === 0 || grid[y][x - 1] === 0) {
                            cizgiler.push({ x1: pikselX, y1: pikselY, x2: pikselX, y2: pikselY + hucreBoyutu });
                        }
                        if (x === genislik - 1 || grid[y][x + 1] === 0) {
                            cizgiler.push({ x1: pikselX + hucreBoyutu, y1: pikselY, x2: pikselX + hucreBoyutu, y2: pikselY + hucreBoyutu });
                        }
                    }
                }
            }
            return cizgiler;
        }

        // Canvas render. Görsel için kodlar burada.
        function haritayiYenile() {
            const canvas = document.getElementById('oyunEkrani');
            const ctx = canvas.getContext('2d');

            // Harita ayarları 15x15 ızgara her bir hücre 50 piksel
            const izgaraBoyutu = 15;
            const hucreBoyutu = 50;

            // Arka planda verileri üret
            const labirentGrid = rastgeleLabirentUret(izgaraBoyutu, izgaraBoyutu);
            const duvarCizgileri = labirentiCizgilereDonustur(labirentGrid, hucreBoyutu);

            // Ekran temizle
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Opsiyonel: Yürünebilir yolları (0'ları) hafif gri gösterdim anlasilsin diye
            ctx.fillStyle = '#222';
            for (let y = 0; y < labirentGrid.length; y++) {
                for (let x = 0; x < labirentGrid[0].length; x++) {
                    if (labirentGrid[y][x] === 0) {
                        ctx.fillRect(x * hucreBoyutu, y * hucreBoyutu, hucreBoyutu, hucreBoyutu);
                    }
                }
            }

            // Duvar çizgilerini (BSP ve Raycast verilerini) Neon Mavi ile çiz
            ctx.strokeStyle = '#00ffff'; 
            ctx.lineWidth = 4;
            ctx.lineCap = 'round';

            ctx.beginPath();
            duvarCizgileri.forEach(cizgi => {
                ctx.moveTo(cizgi.x1, cizgi.y1);
                ctx.lineTo(cizgi.x2, cizgi.y2);
            });
            ctx.stroke();

            // Konsola takım arkadaşlarına gidecek veriyi yazdır
            console.log("Üretilen Duvar Çizgisi Sayısı:", duvarCizgileri.length);
            console.log("Örnek Veri Çıktısı:", duvarCizgileri);
        }

        // Sayfa ilk açılınca hartia çizmesi için
        window.onload = haritayiYenile;

    </script>
</body>
</html>
