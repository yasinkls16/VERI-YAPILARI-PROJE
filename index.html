<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>2D BSP Stealth Game - Entegre Versiyon</title>
    <style>
        body {
            margin: 0;
            background: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: sans-serif;
            flex-direction: column;
        }
        canvas {
            border: 4px solid #34495e;
            background: #1a252f;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <h2>Turuncu dusmandan kacarak yesil bolgeye git. Sakin yakalanma!</h2>
    
    <!-- Arayüz ve Canvas'ı üst üste bindirmek için kapsayıcı -->
    <div style="position: relative; width: 800px; height: 600px;">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        
        <!-- Başlangıç ve Bitiş Menüsü -->
        <div id="uiMenu" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; justify-content: center; align-items: center;">
            <h1 id="menuTitle" style="font-size: 50px; margin-bottom: 20px;">Gizlilik Oyunu</h1>
            <button id="actionBtn" style="padding: 15px 40px; font-size: 24px; cursor: pointer; background: #2ecc71; border: none; color: white; border-radius: 8px; font-weight: bold;">BAŞLAT</button>
        </div>
    </div>

    <script>
        window.module = {};
    </script>
    
    <script src="BspTree.js"></script>
    <script src="vision.js"></script>
    <script src="PhysicsEngine.js"></script>
    <script src="player.js"></script>
    <script src="EnemyAI.js"></script>
    <script src="game.js"></script>
</body>
</html>
